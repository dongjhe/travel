<main class="shell">
  <section class="hero">
    <p class="eyebrow">Family Travel Planner</p>
    <h1>親子旅遊規劃</h1>
    <p class="lead">
      把每次旅行整理成清單：行程頁看每日安排，旅遊消費頁記錄該趟專屬支出，不會和其他旅程混在一起。
    </p>
  </section>

  <section class="trip-list" aria-label="旅遊行程清單">
    <div class="section-title">
      <p class="eyebrow">Trips</p>
      <h2>行程清單</h2>
    </div>

    <a class="trip-row" routerLink="/fukuoka-2026" aria-label="前往福岡之旅行程">
      <span class="trip-no">01</span>
      <span class="trip-main">
        <strong>福岡之旅</strong>
        <span>2026/08/07 ~ 2026/08/12</span>
      </span>
      <a
        class="expense-icon"
        routerLink="/fukuoka-2026/expenses"
        aria-label="前往福岡之旅旅遊消費"
        title="旅遊消費"
        (click)="$event.stopPropagation()"
        >💴</a
      >
      <span class="arrow">→</span>
    </a>
  </section>

  <section id="checklist" class="checklist">
    <h2>親子旅行檢查重點</h2>
    <ul>
      <li>每日行程不要排太滿，保留休息與彈性時間。</li>
      <li>住宿優先確認交通、早餐、洗衣與兒童備品。</li>
      <li>熱門門票提早預約，並確認取消與改期規則。</li>
      <li>準備雨備與室內備案，降低天氣造成的風險。</li>
    </ul>
  </section>
</main>
